<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple API Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Simple API Dashboard</h1>

    <!-- Button to trigger fetching -->
    <button id="fetchButton">Fetch</button>

    <!-- Button to trigger pushing -->
    <button id="pushButton">Push</button>

    <!-- Area to display API response -->
    <div id="response">Response will appear here</div>
    <table id="dataTable"></table> <!-- Add this line to include the table element -->
  </div>
  <script src="script.js"></script>
</body>
</html>
